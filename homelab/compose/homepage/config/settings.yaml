# Homepage global settings
# See https://gethomepage.dev/configs/settings/

title: mchomeserver
theme: dark
color: slate

# Layout: groups arranged as rows, column counts tuned to each group's size.
layout:
  Media:
    style: row
    columns: 2
  AI:
    style: row
    columns: 2
  Network:
    style: row
    columns: 3
  Monitoring:
    style: row
    columns: 3
  Management:
    style: row
    columns: 4

# Header style: boxed info widgets for a modern dashboard look
headerStyle: boxedWidgets

# Use the full browser width, and keep cards within a row the same height
fullWidth: true
useEqualHeights: true

# Modern touches: frosted-glass blur on cards (sits over the custom.css gradient
# backdrop) and hide the Homepage version string in the footer
cardBlur: sm
hideVersion: true

# Background colour
background:
  blur: sm
  saturate: 50
  brightness: 50
  opacity: 50

# Status indicator style for docker-integrated services
statusStyle: dot
