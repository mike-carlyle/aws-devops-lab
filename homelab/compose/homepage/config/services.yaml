# Homepage services config
# Widgets read live data from each service. Credentials live in .env (mode 600)
# and are referenced as {{HOMEPAGE_VAR_*}}.

- Media:
    - Jellyfin:
        icon: jellyfin.svg
        href: http://192.168.1.10:8096
        description: Movies, TV & music — McFlix
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://192.168.1.10:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableNowPlaying: true
          enableBlocks: true
          enableUser: false

    - Minecraft:
        icon: minecraft.svg
        description: Bedrock server — Tailscale only (UDP 19132)
        server: my-docker
        container: Minecraft

- AI:
    - Open WebUI:
        icon: open-webui.svg
        href: http://192.168.1.10:3002
        description: Chat UI for the local models (own login)
        server: my-docker
        container: open-webui

    - Ollama:
        icon: ollama.svg
        href: http://192.168.1.10:3002
        description: LLM backend — qwen2.5 7b + 14b (CPU)
        server: my-docker
        container: ollama
        widget:
          type: customapi
          url: http://ollama:11434/api/version
          refreshInterval: 60000
          mappings:
            - field: version
              label: Version

- Network:
    - AdGuard Home:
        icon: adguard-home.svg
        href: http://192.168.1.10/
        description: Network-wide DNS ad-blocking + DNSSEC
        server: my-docker
        container: adguardhome
        widget:
          type: adguard
          url: http://192.168.1.10
          username: "{{HOMEPAGE_VAR_ADGUARD_USERNAME}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"

    - Tailscale:
        icon: tailscale.svg
        href: https://login.tailscale.com/admin/machines
        description: Mesh VPN — Tailnet Lock enabled

    - Caddy:
        icon: caddy.svg
        description: Reverse proxy — fronts Netdata + Ollama
        server: my-docker
        container: caddy

- Monitoring:
    - Netdata:
        icon: netdata.svg
        href: http://192.168.1.10:19999
        description: Real-time system & container metrics (behind Caddy auth)
        server: my-docker
        container: netdata

    - Uptime Kuma:
        icon: uptime-kuma.svg
        href: http://192.168.1.10:3001
        description: Service uptime monitoring with email alerts
        server: my-docker
        container: uptime-kuma

    - fail2ban:
        icon: fail2ban.svg
        description: SSH brute-force protection (LAN + Tailscale allowlist)
        server: my-docker
        container: fail2ban

- Management:
    - Portainer:
        icon: portainer.svg
        href: http://192.168.1.10:9000
        description: Docker container management UI
        server: my-docker
        container: portainer
        widget:
          type: portainer
          url: http://192.168.1.10:9000
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_TOKEN}}"

    - Watchtower:
        icon: watchtower.svg
        description: Automated container image updates (hourly)
        server: my-docker
        container: watchtower
        widget:
          type: watchtower
          url: http://watchtower:8080
          key: "{{HOMEPAGE_VAR_WATCHTOWER_TOKEN}}"

    - Duplicati:
        icon: duplicati.svg
        href: http://192.168.1.10:8200
        description: Encrypted daily backups to OneDrive
        server: my-docker
        container: duplicati

    - Socket Proxy:
        icon: docker.svg
        description: Hardened Docker API proxy for Watchtower
        server: my-docker
        container: socket-proxy
