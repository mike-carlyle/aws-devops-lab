services:
  portainer:
    image: portainer/portainer-ce:latest
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 256
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
