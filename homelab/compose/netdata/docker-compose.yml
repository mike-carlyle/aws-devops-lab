services:
  netdata:
    image: netdata/netdata:stable
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 1024
    container_name: netdata
    hostname: netdata
    ports:
      - 127.0.0.1:19998:19999
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    environment:
      - NETDATA_HOST_PREFIX=/host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
    restart: unless-stopped
    # Run tini as PID 1 to reap zombie children (healthcheck + spawn-server processes)
    init: true
    labels:
      - com.centurylinklabs.watchtower.enable=true

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
