---
# Ensure Ubuntu's unattended-upgrades package is installed, daily runs are
# enabled, and the box mails the admin user when upgrades fail or a reboot
# is required.

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable daily apt update + unattended upgrade
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Layer homelab-specific overrides on top of distro defaults
  # 99- prefix sorts last so it wins over /etc/apt/apt.conf.d/50unattended-upgrades.
  ansible.builtin.template:
    src: 99-homelab-overrides.j2
    dest: /etc/apt/apt.conf.d/99-homelab-overrides
    owner: root
    group: root
    mode: "0644"

- name: Ensure unattended-upgrades service is enabled
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
