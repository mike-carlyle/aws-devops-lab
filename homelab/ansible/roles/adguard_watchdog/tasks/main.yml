---
# Self-healing watchdog for the AdGuard Home DNS container.
#
# A systemd timer runs a probe every 30s; if AdGuard stops answering on
# 127.0.0.1:53 for two consecutive checks, the container is restarted. This
# guards against the LAN's single DNS resolver wedging without taking the
# whole network's name resolution down with it.
#
# Depends on Docker being installed (docker_host) and the adguard service
# being deployed (deploy-stack.yml). If the container isn't up yet the probe
# simply keeps failing harmlessly until it is.

- name: Install dnsutils (provides dig, used by the watchdog probe)
  ansible.builtin.apt:
    name: dnsutils
    state: present
    update_cache: true

- name: Install the AdGuard DNS watchdog script
  ansible.builtin.template:
    src: adguard-dns-watchdog.sh.j2
    dest: /usr/local/sbin/adguard-dns-watchdog.sh
    owner: root
    group: root
    mode: "0755"

- name: Install the watchdog systemd service unit
  ansible.builtin.template:
    src: adguard-dns-watchdog.service.j2
    dest: /etc/systemd/system/adguard-dns-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install the watchdog systemd timer unit
  ansible.builtin.template:
    src: adguard-dns-watchdog.timer.j2
    dest: /etc/systemd/system/adguard-dns-watchdog.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start the watchdog timer
  ansible.builtin.systemd:
    name: adguard-dns-watchdog.timer
    enabled: true
    state: started
    daemon_reload: true
