---
# Verify docker engine + compose plugin are present and the admin user can
# talk to the daemon. Does NOT install docker from scratch — that's a one-off
# bootstrap step. Re-running this role on a working box is a no-op.
#
# To install docker fresh on a new host, run upstream's get-docker.sh first:
#   curl -fsSL https://get.docker.com | sh
#   sudo usermod -aG docker {{ admin_user }}

- name: Check docker engine is installed
  ansible.builtin.command: docker --version
  register: docker_version_check
  changed_when: false
  failed_when: docker_version_check.rc != 0

# Docker Compose v2 ships in two forms:
#   * plugin       — /usr/libexec/docker/cli-plugins/docker-compose, invoked as `docker compose`
#   * standalone   — /usr/local/bin/docker-compose, invoked as `docker-compose`
# Either is fine for running services on the host (Phase 1 uses the
# containerised plugin via cytopia/ansible). Accept whichever is present.
- name: Check docker compose v2 is installed (plugin OR standalone)
  ansible.builtin.shell: |
    if docker compose version >/dev/null 2>&1; then
      docker compose version
      echo "form=plugin"
    elif command -v docker-compose >/dev/null 2>&1; then
      docker-compose --version
      echo "form=standalone"
    else
      echo "neither 'docker compose' (plugin) nor 'docker-compose' (standalone) found" >&2
      exit 1
    fi
  args:
    executable: /bin/bash
  register: compose_version_check
  changed_when: false

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure admin user is in docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true

- name: Set system-wide docker daemon log limits (rotate before disks fill)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Reload docker daemon

- name: Report installed versions
  ansible.builtin.debug:
    msg:
      - "Docker engine: {{ docker_version_check.stdout }}"
      - "Docker compose: {{ compose_version_check.stdout }}"
