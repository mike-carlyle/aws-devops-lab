---
# Single-host inventory for the homelab.
# Ansible runs against localhost via `connection: local` so no SSH involved —
# the playbook is expected to run on the homeserver itself (or via the docker
# wrapper that bind-mounts /home/mike and /var/run/docker.sock).

all:
  hosts:
    mchomeserver:
      ansible_connection: local
      ansible_host: 127.0.0.1
