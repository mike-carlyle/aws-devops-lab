---
# Ansible Galaxy collection dependencies.
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# community.general provides ufw, apt_repository, etc.
# community.docker is used by the Phase 1 deploy-stack playbook.

collections:
  - name: community.general
    version: ">=8.0.0"
  - name: community.docker
    version: ">=3.0.0"
  - name: ansible.posix
    version: ">=1.5.0"
