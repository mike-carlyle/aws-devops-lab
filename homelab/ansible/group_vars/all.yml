---
# Where the repo lives on the target host (used to source compose files).
# Defaults to the standard clone location; override on the command line if elsewhere:
#   ansible-playbook deploy-stack.yml -e repo_root=/some/other/path
repo_root: "{{ lookup('env', 'HOME') }}/aws-devops-lab"

# Where each service's runtime directory lives (mounted by docker-compose).
service_root: "{{ lookup('env', 'HOME') }}"

# Primary admin user on the host. Owns the service runtime directories,
# member of the docker group, target for root mail aliases.
admin_user: mike

# Networks treated as trusted for firewall + fail2ban allowlists.
#   lan_cidr        — local wired/wireless LAN
#   tailscale_cidr  — Tailscale's CGNAT range (any device on the tailnet)
lan_cidr: "192.168.1.0/24"
tailscale_cidr: "100.64.0.0/10"

# SMTP relay used by msmtp for system mail (cron, unattended-upgrades,
# fail2ban notifications). Credentials come from group_vars/vault.yml.
msmtp_smtp_host: "smtp.gmail.com"
msmtp_smtp_port: 587

# UFW ruleset — codified from the actual current state on mchomeserver
# (captured 2026-06-06 via `sudo ufw status verbose`).
#
# Model:
#   * UFW filters LAN + internet traffic.
#   * Tailscale's own iptables rules let tailnet traffic reach services on
#     the tailscale0 interface, bypassing UFW. That's why management UIs
#     (Portainer:9000, Duplicati:8200, AdGuard admin:80) listen on
#     0.0.0.0 but have NO UFW allow rules — they're Tailscale-only by
#     virtue of UFW blocking LAN/internet access.
#   * Rules below are additive — community.general.ufw adds them if
#     missing, never removes ones not listed here. To remove a rule on
#     the host, do it manually first (`sudo ufw delete <num>`).
#
# Default policies (set by the ufw role): deny incoming, allow outgoing,
# deny routed. The "DENY IN Anywhere" rules for 53/19999/19132 currently
# on the host are redundant with default-deny and intentionally NOT
# codified here to keep the list scannable.
ufw_rules:
  # SSH — LAN + Tailscale only. NOT internet-facing.
  - {rule: allow, port: "22", proto: tcp, from_ip: "{{ lan_cidr }}", comment: "SSH LAN"}
  - {rule: allow, port: "22", proto: tcp, from_ip: "{{ tailscale_cidr }}", comment: "SSH Tailscale"}

  # AdGuard DNS — LAN clients resolve through the box.
  - {rule: allow, port: "53", proto: tcp, from_ip: "{{ lan_cidr }}", comment: "AdGuard DNS TCP"}
  - {rule: allow, port: "53", proto: udp, from_ip: "{{ lan_cidr }}", comment: "AdGuard DNS UDP"}

  # Caddy → Netdata (basic auth in front of monitoring UI) — LAN + Tailscale.
  # No explicit proto: matches existing imprecise rule. Tightening to tcp-only
  # is a worthwhile future change but kept loose here to codify current reality.
  - {rule: allow, port: "19999", from_ip: "{{ lan_cidr }}", comment: "Caddy/Netdata LAN"}
  - {rule: allow, port: "19999", from_ip: "{{ tailscale_cidr }}", comment: "Caddy/Netdata Tailscale"}

  # Jellyfin — LAN + Tailscale (host network mode, listens 0.0.0.0:8096).
  # No explicit proto: matches existing imprecise rule (see note above).
  - {rule: allow, port: "8096", from_ip: "{{ lan_cidr }}", comment: "Jellyfin LAN"}
  - {rule: allow, port: "8096", from_ip: "{{ tailscale_cidr }}", comment: "Jellyfin Tailscale"}

  # Homepage — LAN + Tailscale.
  - {rule: allow, port: "3000", proto: tcp, from_ip: "{{ lan_cidr }}", comment: "Homepage LAN"}
  - {rule: allow, port: "3000", proto: tcp, from_ip: "{{ tailscale_cidr }}", comment: "Homepage Tailscale"}

  # Uptime Kuma — LAN + Tailscale.
  - {rule: allow, port: "3001", proto: tcp, from_ip: "{{ lan_cidr }}", comment: "Uptime Kuma LAN"}
  - {rule: allow, port: "3001", proto: tcp, from_ip: "{{ tailscale_cidr }}", comment: "Uptime Kuma Tailscale"}

  # Minecraft Bedrock — Tailscale only.
  - {rule: allow, port: "19132", proto: udp, from_ip: "{{ tailscale_cidr }}", comment: "Minecraft Bedrock Tailscale"}

# Services to manage. Each entry maps to a directory under both
# {{ repo_root }}/homelab/compose/<name> (the source of truth) and
# {{ service_root }}/<name> (the runtime location).
#
# 'start' controls whether 'docker compose up -d' is invoked. Set to false for
# services that should stay stopped (e.g. vpn-stack is intentionally inactive)
# or services without a real .env in place yet.
services:
  - name: adguard
    start: true
  - name: caddy
    start: true
  - name: duplicati
    start: true
  - name: fail2ban
    start: true
  - name: homepage
    start: true
  - name: jellyfin
    start: true
  - name: minecraft
    start: true
  - name: netdata
    start: true
  - name: portainer
    start: true
  - name: uptime-kuma
    start: true
  - name: watchtower
    start: true
  - name: vpn-stack
    start: false   # currently stopped; flip to true to bring qBittorrent + Gluetun back up
